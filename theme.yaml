branding:
  title: "Astrid"
  primaryColor: "#f92a82"
  secondaryColor: "#89a1ef"
  linkColor: "#89a1ef"
  linkHoverColor: "#fffd82"
  headerColor: "#2d3047"
  headerGradientEnd: "#1a1b2e"
  sidebarColor: "#2d3047"
  sidebarGradientEnd: "#1a1b2e"
  logo: assets/logo.png
  favicon: assets/favicon.svg
  contact: "support@astrid.fit"
  background: minimal

customCSS: |
  button.border-white\/30:has(svg path[d^="M12 3l1.5"]) {
    background-color: #fffd82 !important;
    border-color: #fffd82 !important;
    color: #2d3047 !important;
  }
  button.border-white\/30:has(svg path[d^="M12 3l1.5"]):hover {
    background-color: #e6e47a !important;
  }
  button.border-white\/30:has(svg path[d^="M12 3l1.5"]) svg {
    color: #2d3047 !important;
  }
